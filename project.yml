name: PlusPlus
packages:
  PlusPlusKit:
    path: PlusPlusKit
options:
  bundleIdPrefix: com.davidcole
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"

schemes:
  PlusPlus:
    build:
      targets:
        PlusPlus: all
    test:
      gatherCoverageData: false
      targets:
        - PlusPlusTests

  PlusPlusUI:
    build:
      targets:
        PlusPlus: all
    test:
      gatherCoverageData: false
      targets:
        - PlusPlusUITests

targets:
  PlusPlus:
    type: application
    platform: iOS
    sources:
      - PlusPlus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus
        # App Store validation rejects an empty CFBundleShortVersionString;
        # the build number (CFBundleVersion) comes from the TestFlight
        # workflow's run number.
        MARKETING_VERSION: 0.1.0
        # iPhone-only for v1 (issue #41); still runs letterboxed on iPad.
        TARGETED_DEVICE_FAMILY: 1
        # Placeholder ++ mark (issue #39) so TestFlight upload validation
        # passes; Dave designs the real one later.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # No non-exempt encryption: skips the compliance question on every
        # TestFlight upload (#55).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: PlusPlusWatch
      - package: PlusPlusKit

  PlusPlusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PlusPlusTests
    dependencies:
      - target: PlusPlus
      - package: PlusPlusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.tests
        GENERATE_INFOPLIST_FILE: YES

  PlusPlusUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PlusPlusUITests
    dependencies:
      - target: PlusPlus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PlusPlus

  PlusPlusWatch:
    type: application
    platform: watchOS
    sources:
      - PlusPlusWatch
    dependencies:
      - package: PlusPlusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.watchkitapp
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.davidcole.plusplus
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_EMIT_LOC_STRINGS: YES
