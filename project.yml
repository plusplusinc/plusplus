name: PlusPlus
packages:
  PlusPlusKit:
    path: PlusPlusKit
options:
  bundleIdPrefix: com.davidcole
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"

schemes:
  PlusPlus:
    build:
      targets:
        PlusPlus: all
    test:
      gatherCoverageData: false
      targets:
        - PlusPlusTests

  PlusPlusUI:
    build:
      targets:
        PlusPlus: all
    test:
      gatherCoverageData: false
      targets:
        - PlusPlusUITests

targets:
  PlusPlus:
    type: application
    platform: iOS
    sources:
      - PlusPlus
      # Shared with the widget extension (#147): activity attributes +
      # the App Group snapshot types.
      - PlusPlusShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus
        # Extensions refuse to install with an EMPTY CFBundleVersion
        # (simulator: "bundleVersion must be set in placeholder
        # attributes"), so the project carries a default; the TestFlight
        # workflow's command-line setting overrides it with run_number.
        CURRENT_PROJECT_VERSION: 1
        # App Store validation rejects an empty CFBundleShortVersionString;
        # the build number (CFBundleVersion) comes from the TestFlight
        # workflow's run number.
        MARKETING_VERSION: 0.1.0
        # iPhone-only for v1 (issue #41); still runs letterboxed on iPad.
        TARGETED_DEVICE_FAMILY: 1
        # Placeholder ++ mark (issue #39) so TestFlight upload validation
        # passes; Dave designs the real one later.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    # Explicit Info.plist (was GENERATE_INFOPLIST_FILE) because
    # CFBundleURLTypes can't be expressed as INFOPLIST_KEY_* settings.
    # CFBundleVersion must stay wired to CURRENT_PROJECT_VERSION — the
    # TestFlight workflow injects the run number through it (#55).
    info:
      path: PlusPlus/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        # No non-exempt encryption: skips the compliance question on every
        # TestFlight upload (#55).
        ITSAppUsesNonExemptEncryption: false
        # plusplus://r#… share-link imports (#145). Universal links
        # (https viewer URLs opening the app) come later with the
        # associated-domains entitlement + real team ID in the AASA.
        CFBundleURLTypes:
          - CFBundleURLName: com.davidcole.plusplus.share
            CFBundleURLSchemes: [plusplus]
        # Rest countdown in the Dynamic Island / Lock Screen (#147).
        NSSupportsLiveActivities: true
        # Finished sessions save to Health as workouts (#90). Both strings
        # required: the auth request names share types even though the
        # phone only writes.
        NSHealthUpdateUsageDescription: PlusPlus saves your finished workouts to Health.
        NSHealthShareUsageDescription: PlusPlus saves your finished workouts to Health.
    # App Group shared with the widget extension — the snapshot channel.
    entitlements:
      path: PlusPlus/PlusPlus.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.davidcole.plusplus
        # Health writes (#90).
        com.apple.developer.healthkit: true
        # Universal links (#156): https share links open the app when
        # installed. Needs Associated Domains enabled on the App ID in
        # the portal, like every capability (see the 2026-07-08
        # entitlements decision).
        com.apple.developer.associated-domains:
          - applinks:plusplus.fit
    dependencies:
      - target: PlusPlusWatch
      - target: PlusPlusWidgets
      - package: PlusPlusKit

  PlusPlusWidgets:
    type: app-extension
    platform: iOS
    sources:
      - PlusPlusWidgets
      - PlusPlusShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_EMIT_LOC_STRINGS: YES
        SKIP_INSTALL: YES
    info:
      path: PlusPlusWidgets/Info.plist
      properties:
        CFBundleDisplayName: PlusPlus Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PlusPlusWidgets/PlusPlusWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.davidcole.plusplus

  PlusPlusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PlusPlusTests
    dependencies:
      - target: PlusPlus
      - package: PlusPlusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.tests
        GENERATE_INFOPLIST_FILE: YES

  PlusPlusUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PlusPlusUITests
    dependencies:
      - target: PlusPlus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PlusPlus

  PlusPlusWatch:
    type: application
    platform: watchOS
    sources:
      - PlusPlusWatch
    dependencies:
      - package: PlusPlusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.watchkitapp
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    # Explicit Info.plist (was GENERATE_INFOPLIST_FILE) because
    # WKBackgroundModes has no INFOPLIST_KEY_* build setting and the
    # HKWorkoutSession (#90) requires the workout-processing mode.
    info:
      path: PlusPlusWatch/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.davidcole.plusplus
        ITSAppUsesNonExemptEncryption: false
        WKBackgroundModes:
          - workout-processing
        NSHealthShareUsageDescription: PlusPlus reads heart rate and energy during workouts you run from your wrist.
        NSHealthUpdateUsageDescription: PlusPlus saves workouts you run from your wrist to Health.
    entitlements:
      path: PlusPlusWatch/PlusPlusWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
