name: PlusPlus
options:
  bundleIdPrefix: com.davidcole
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"

targets:
  PlusPlus:
    type: application
    platform: iOS
    sources:
      - PlusPlus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: PlusPlusWatch

  PlusPlusWatch:
    type: application
    platform: watchOS
    sources:
      - PlusPlusWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidcole.plusplus.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.davidcole.plusplus
        SWIFT_EMIT_LOC_STRINGS: YES
