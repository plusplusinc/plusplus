# CLI release: push a v* tag — or dispatch with a version, which creates
# the tag as part of the release (remote Claude sessions can't push tags
# through the git relay). Either way: a GitHub Release with Linux and
# macOS binaries plus checksums (issue #37). The macOS job bills at 10x
# but only runs on releases, so cost stays bounded. The Homebrew tap
# (owner action — see #37) will point at these artifacts.
name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create and release (e.g. v0.1.0)"
        required: true

jobs:
  linux:
    runs-on: ubuntu-latest
    container: swift:latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build (static stdlib)
        run: |
          swift build -c release --package-path PlusPlusCLI --static-swift-stdlib
          mkdir -p dist
          cp PlusPlusCLI/.build/release/plusplus dist/plusplus-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: plusplus-linux-x86_64
          path: dist/plusplus-linux-x86_64

  macos:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swift build -c release --package-path PlusPlusCLI
          mkdir -p dist
          cp PlusPlusCLI/.build/release/plusplus dist/plusplus-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: plusplus-macos-arm64
          path: dist/plusplus-macos-arm64

  release:
    needs: [linux, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum plusplus-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          # On dispatch the tag doesn't exist yet; --target makes gh
          # create it at the dispatched commit.
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "plusplus $VERSION" \
            --generate-notes \
            dist/plusplus-linux-x86_64 dist/plusplus-macos-arm64 dist/SHA256SUMS
