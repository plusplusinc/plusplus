# CI on GitHub's macOS runners — the substitute for local Simulator
# validation when development happens in remote (Linux) Claude sessions.
# The repo is public, so Actions minutes are free; the old paths-ignore
# for docs-only pushes is gone because main's ruleset REQUIRES these
# checks — a push that skips CI leaves its PR permanently unmergeable.
name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  # Fork PRs get zero checks from push triggers, which leaves them
  # permanently unmergeable under the ruleset (#160). Same-repo PRs skip
  # the pull_request runs (their push runs already carry the checks).
  pull_request:
  workflow_dispatch:

# A superseded push on the same branch cancels the older run; runs on main
# are never cancelled so every merge keeps its artifacts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    # Same-repo PRs already ran on push; only fork PRs need this event.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 found; available:" && ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available --json | python3 -c "
          import sys, json
          devices = json.load(sys.stdin)['devices']
          iphones = [d['name'] for runtime, devs in devices.items()
                     if 'iOS' in runtime for d in devs
                     if d['name'].startswith('iPhone')]
          print(sorted(iphones)[-1])
          ")
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project PlusPlus.xcodeproj \
            -scheme PlusPlus \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

      # Job logs and artifacts live on Azure blob storage, which the remote
      # agent sandbox can't reach; annotations ride the Checks API and are
      # readable from anywhere. Surface the failure lines there.
      - name: Surface failures as annotations
        if: failure()
        run: |
          [ -f xcodebuild.log ] || exit 0
          grep -E "Test Case '.*' failed|✘ Test|recorded an issue|Fatal error|TEST FAILED|Restarting after unexpected exit|error:" xcodebuild.log \
            | sort -u | head -10 | while IFS= read -r line; do
            echo "::error title=CI failure detail::$(echo "$line" | tr -d '\r' | cut -c1-400)"
          done
          exit 0

  # PlusPlusKit is platform-pure by design (docs/PLATFORM.md); its tests run
  # on Linux at 1x minutes, and this job failing means someone leaked an
  # Apple-only dependency into the shared core.
  kit-test:
    # Same-repo PRs already ran on push; only fork PRs need this event.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    container: swift:latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run PlusPlusKit tests
        # Explicit bash: the swift container's default step shell can be
        # dash, where `set -o pipefail` itself exits 2 before swift runs.
        shell: bash
        run: |
          set -o pipefail
          swift test --package-path PlusPlusKit 2>&1 | tee kit-test.log
      - name: Surface failures as annotations
        if: failure()
        shell: bash
        run: |
          [ -f kit-test.log ] || exit 0
          grep -E "✘|error:|Fatal error" kit-test.log | sort -u | head -10 | while IFS= read -r line; do
            echo "::error title=kit-test failure::$(echo "$line" | tr -d '\r' | cut -c1-400)"
          done
          exit 0

  # The plusplus CLI builds and tests on Linux (issue #24); same 1x-minute
  # economics as kit-test.
  cli-test:
    # Same-repo PRs already ran on push; only fork PRs need this event.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    container: swift:latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run CLI tests
        # Explicit bash — see kit-test.
        shell: bash
        run: |
          set -o pipefail
          swift test --package-path PlusPlusCLI 2>&1 | tee cli-test.log
      - name: Build release binary
        run: swift build -c release --package-path PlusPlusCLI
      - name: Surface failures as annotations
        if: failure()
        shell: bash
        run: |
          [ -f cli-test.log ] || exit 0
          grep -E "✘|error:|Fatal error" cli-test.log | sort -u | head -10 | while IFS= read -r line; do
            echo "::error title=cli-test failure::$(echo "$line" | tr -d '\r' | cut -c1-400)"
          done
          exit 0

  # UI smoke tests + screenshots. Slower and more minute-hungry than the
  # unit job, so gated to manual dispatch and pushes to main.
  ui-test:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 found; available:" && ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available --json | python3 -c "
          import sys, json
          devices = json.load(sys.stdin)['devices']
          iphones = [d['name'] for runtime, devs in devices.items()
                     if 'iOS' in runtime for d in devs
                     if d['name'].startswith('iPhone')]
          print(sorted(iphones)[-1])
          ")
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run UI smoke tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project PlusPlus.xcodeproj \
            -scheme PlusPlusUI \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ui-xcodebuild.log

      - name: Export screenshots
        if: always()
        run: |
          if [ -d UITestResults.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path UITestResults.xcresult \
              --output-path screenshots || echo "attachment export failed"
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Upload UI test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-xcodebuild-log
          path: ui-xcodebuild.log
          if-no-files-found: ignore
