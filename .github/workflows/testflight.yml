# TestFlight upload from CI (issue #55) — dispatch manually when you want
# a build on the phone. Uses cloud-managed signing via an App Store
# Connect API key: no certificates or provisioning profiles live in this
# repo or its secrets.
#
# Required repo secrets (one-time owner setup, see issue #55):
#   ASC_KEY_P8     contents of the AuthKey_XXXX.p8 file
#   ASC_KEY_ID     the key's ID (e.g. 2X9R4HXF34)
#   ASC_ISSUER_ID  the issuer UUID from App Store Connect → Integrations
#   ASC_TEAM_ID    the Apple Developer team ID (e.g. AB12CD34EF)
#
# Build number = the workflow run number, so every upload is unique.
name: TestFlight

on:
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -z "$ASC_KEY_ID" ]; then
            echo "::error::App Store Connect secrets are not configured — see issue #55 for the one-time setup."
            exit 1
          fi

      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 found; available:" && ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/private_keys/AuthKey_"$ASC_KEY_ID".p8

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PlusPlus.xcodeproj \
            -scheme PlusPlus \
            -destination "generic/platform=iOS" \
            -archivePath build/PlusPlus.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_"$ASC_KEY_ID".p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="$ASC_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            2>&1 | tee archive.log
        # The archive is deliberately unsigned: automatic signing at
        # archive time wants a *development* profile, which requires a
        # registered device — a fresh team has none, and overriding the
        # identity to Apple Distribution conflicts with automatic style.
        # The export step below does the real signing: cloud signing via
        # the API key mints App Store profiles, which need no devices.

      # The unsigned archive carries no .xcent, so the export's cloud
      # signing requested NO capability entitlements — builds 18/20
      # failed App Store validation (90701: watch declares
      # workout-processing without healthkit in its signature), and the
      # App Group never shipped in 17. The build system refuses ad-hoc
      # signing for iOS/watchOS SDKs (build 19), but the codesign CLI
      # will happily sign the archived bundles with a throwaway
      # self-signed identity — embedding the real entitlements for the
      # export's re-sign to read as its request. The App IDs carry the
      # capabilities (portal, 2026-07-07), so the profiles can satisfy it.
      - name: Embed entitlements via self-signed archive signatures
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sign.keychain-db"
          security create-keychain -p ci-temp "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-temp "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          openssl req -x509 -newkey rsa:2048 -keyout "$RUNNER_TEMP/key.pem" \
            -out "$RUNNER_TEMP/cert.pem" -days 1 -nodes \
            -subj "/CN=PlusPlus CI Signing" \
            -addext "keyUsage=digitalSignature" \
            -addext "extendedKeyUsage=codeSigning"
          openssl pkcs12 -export -out "$RUNNER_TEMP/cert.p12" \
            -inkey "$RUNNER_TEMP/key.pem" -in "$RUNNER_TEMP/cert.pem" \
            -passout pass:ci-temp
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P ci-temp \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-temp "$KEYCHAIN" >/dev/null

          APP="build/PlusPlus.xcarchive/Products/Applications/PlusPlus.app"
          # Nested-first, container last; each bundle gets its own
          # xcodegen-generated entitlements file.
          codesign -f -s "PlusPlus CI Signing" --keychain "$KEYCHAIN" \
            --entitlements PlusPlusWatch/PlusPlusWatch.entitlements \
            "$APP/Watch/PlusPlusWatch.app"
          codesign -f -s "PlusPlus CI Signing" --keychain "$KEYCHAIN" \
            --entitlements PlusPlusWidgets/PlusPlusWidgets.entitlements \
            "$APP/PlugIns/PlusPlusWidgets.appex"
          codesign -f -s "PlusPlus CI Signing" --keychain "$KEYCHAIN" \
            --entitlements PlusPlus/PlusPlus.entitlements \
            "$APP"
          echo "--- embedded entitlements (watch):"
          codesign -d --entitlements - "$APP/Watch/PlusPlusWatch.app" || true

      - name: Export and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${ASC_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PlusPlus.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_"$ASC_KEY_ID".p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            2>&1 | tee export.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-logs
          path: |
            archive.log
            export.log
          if-no-files-found: ignore
