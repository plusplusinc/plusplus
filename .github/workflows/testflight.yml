# TestFlight upload from CI (issue #55) — dispatch manually when you want
# a build on the phone. Uses cloud-managed signing via an App Store
# Connect API key: no certificates or provisioning profiles live in this
# repo or its secrets.
#
# Required repo secrets (one-time owner setup, see issue #55):
#   ASC_KEY_P8     contents of the AuthKey_XXXX.p8 file
#   ASC_KEY_ID     the key's ID (e.g. 2X9R4HXF34)
#   ASC_ISSUER_ID  the issuer UUID from App Store Connect → Integrations
#   ASC_TEAM_ID    the Apple Developer team ID (e.g. AB12CD34EF)
#
# Build number = the workflow run number, so every upload is unique.
name: TestFlight

on:
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -z "$ASC_KEY_ID" ]; then
            echo "::error::App Store Connect secrets are not configured — see issue #55 for the one-time setup."
            exit 1
          fi

      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 found; available:" && ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/private_keys/AuthKey_"$ASC_KEY_ID".p8

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PlusPlus.xcodeproj \
            -scheme PlusPlus \
            -destination "generic/platform=iOS" \
            -archivePath build/PlusPlus.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_"$ASC_KEY_ID".p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="$ASC_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            2>&1 | tee archive.log
        # The archive is AD-HOC signed (identity "-", no certificate
        # needed) rather than unsigned: a fully unsigned archive carries
        # no .xcent files, so the export step's cloud signing requested
        # NO capability entitlements — build 18 failed upload validation
        # because the watch bundle demanded healthkit (90701), and the
        # App Group entitlement silently never shipped in build 17.
        # Ad-hoc signing runs the entitlements phase and embeds each
        # bundle's .xcent; the export re-signs with those requests and
        # -allowProvisioningUpdates aligns App IDs/profiles to match.
        # (Historical note: automatic signing at archive time wants a
        # development profile + registered device, which this team
        # doesn't have — that's why archive-time REAL signing is out.)

      - name: Export and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${ASC_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PlusPlus.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_"$ASC_KEY_ID".p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            2>&1 | tee export.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-logs
          path: |
            archive.log
            export.log
          if-no-files-found: ignore
