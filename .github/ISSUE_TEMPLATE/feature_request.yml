name: Feature request
description: Propose a change to the app, the format, or the tooling
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do (or what's painful) today? Concrete training scenarios beat abstract wishes.
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: What you'd want it to look like
      description: Optional — sketch the behavior. Note PlusPlus's design rules (quiet terminal, green is data, presence over obligation words) if UI-facing.
    validations:
      required: false
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - iOS app
        - Watch app
        - Widgets / platform surfaces
        - Interchange format / PlusPlusKit
        - CLI / MCP / agents
        - Website
        - Not sure
    validations:
      required: false
